# Nginx config for Glitch UI proxy (S3 + Lambda Gateway).
#
# NOTE: This file is a REFERENCE only. The bucket and Lambda URL below are
# placeholders (account 999776382415). On deploy, the Tailscale stack writes
# the real config to the EC2 with your account's bucket and gateway URL.
# Do NOT copy this file to the EC2 as-is unless you replace those values.
#
# To use manually: substitute glitch-ui-ACCOUNT-REGION and the Lambda URL,
# then: sudo cp glitch-proxy.conf /etc/nginx/conf.d/glitch-proxy.conf
#       sudo nginx -t && sudo systemctl reload nginx
#
# TCP stream proxy for UDM-Pro (in /etc/nginx/nginx.conf, NOT this file):
# Port 443  — forwards to UDM-Pro at 192.168.1.1:443. Used for Protect
#             integration API + WebSocket with X-API-KEY header auth.
#             Exposed to the internet via UDM-Pro port forward: WAN 13443 → LAN 10.10.100.230:443.
# Port 7443 — legacy cookie-auth path, forwards to 192.168.1.1:443.
#
# stream {
#     server {
#         listen 7443;
#         proxy_pass 192.168.1.1:443;
#         proxy_connect_timeout 10s;
#         proxy_timeout 3600s;
#     }
#     server {
#         listen 443;
#         proxy_pass 192.168.1.1:443;
#         proxy_connect_timeout 10s;
#         proxy_timeout 3600s;
#     }
# }

server {
    listen 80;
    server_name glitch.awoo.agency _;

    location / {
        proxy_pass http://glitch-ui-999776382415-us-west-2.s3-website-us-west-2.amazonaws.com;
        proxy_set_header Host glitch-ui-999776382415-us-west-2.s3-website-us-west-2.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass https://6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws/api/;
        proxy_set_header Host 6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /invocations {
        proxy_pass https://6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws/invocations;
        proxy_set_header Host 6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /health {
        proxy_pass https://6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws/health;
        proxy_set_header Host 6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
    }
}
