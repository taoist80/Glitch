# Nginx config for Glitch UI proxy (S3 + Lambda Gateway).
# Copy to EC2 Tailscale instance: sudo cp glitch-proxy.conf /etc/nginx/conf.d/glitch-proxy.conf
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name glitch.awoo.agency _;

    location / {
        proxy_pass http://glitch-ui-999776382415-us-west-2.s3-website-us-west-2.amazonaws.com;
        proxy_set_header Host glitch-ui-999776382415-us-west-2.s3-website-us-west-2.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass https://6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws/api/;
        proxy_set_header Host 6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
    }

    location /invocations {
        proxy_pass https://6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws/invocations;
        proxy_set_header Host 6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /health {
        proxy_pass https://6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws/health;
        proxy_set_header Host 6uw6ayhu7sjytyiyhq7yvuejma0iukfc.lambda-url.us-west-2.on.aws;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
    }
}
