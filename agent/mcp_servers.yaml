# MCP Server Configuration
#
# Define external MCP servers that Glitch can connect to for additional tools.
# Environment variables can be referenced using ${VAR_NAME} syntax.
#
# Load config from a remote host: set GLITCH_MCP_CONFIG_REMOTE=host_alias:remote_path
# (e.g. GLITCH_MCP_CONFIG_REMOTE=bastion:~/mcp_servers.yaml).
#
# Run a server on a remote host: add ssh_host (alias from GLITCH_SSH_HOSTS). The command
# is executed on that host over SSH; stdio is forwarded (e.g. ssh_host: bastion).

mcp_servers:
  unifi:
    enabled: false  # Disabled for local dev (requires npx/unifi-mcp-server)
    transport: stdio
    command: npx
    args:
      - -y
      - unifi-mcp-server
    env:
      # API key from UniFi Site Manager (https://account.ui.com/api-keys)
      UNIFI_API_KEY: ${UNIFI_API_KEY}
      # API type: 'cloud' for UniFi Site Manager, 'local' for on-premises controller
      UNIFI_API_TYPE: ${UNIFI_API_TYPE}
      # For local mode only: gateway IP address (e.g., 192.168.1.1)
      # UNIFI_LOCAL_HOST: ${UNIFI_LOCAL_HOST}
    prefix: unifi
    tool_filters:
      allowed: []  # Empty list = all tools allowed
      rejected: []  # List of tool names to exclude

  # Example: Add more MCP servers here
  # aws-docs:
  #   enabled: false
  #   transport: stdio
  #   command: uvx
  #   args:
  #     - awslabs.aws-documentation-mcp-server@latest
  #   prefix: aws_docs
  #
  # Example: Run MCP server on a remote host (requires SSH key and host in GLITCH_SSH_HOSTS)
  # remote-aws-docs:
  #   enabled: false
  #   transport: stdio
  #   ssh_host: bastion
